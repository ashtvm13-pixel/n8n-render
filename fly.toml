app = "n8n-ashtvm"
primary_region = "sin"

[build]
  image = "docker.n8n.io/n8nio/n8n:latest"

[env]
  PORT = "5678"

[http_service]
  internal_port = 5678
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[[mounts]]
  source = "n8n_data"
  destination = "/home/node/.n8n"
  initial_size = "1gb"
